<!DOCTYPE html>
<html>
    <body>

        <h2>Radio Buttons</h2>

        <p>Gender</p>

        <form>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female" checked>
            <label for="female">Female</label><br>
        </form>
    </body>
</html>
